name: Update BTC EQM Chart

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC daily (markets closed, Binance candle settled)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas matplotlib scipy

      - name: Run model
        run: python eqm_model.py

      - name: Commit and push updated files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add eqm_rainbow_tv.html btc_prices.csv
          git diff --staged --quiet || git commit -m "Auto-update chart $(date -u +%Y-%m-%d)"
          git push
