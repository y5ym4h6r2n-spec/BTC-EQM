  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      --font-mono: 'Courier New', 'Menlo', monospace;
      --bg: #ffffff;
      --text: #111111;

      background: #fff;

<body>

<!-- Loader -->
<div id="loader">

</div>

<!-- App shell -->
<div id="shell">
  <div id="hdr">
    <h1>Bitcoin Empirical Quantile Model (EQM) Rainbow &nbsp;·&nbsp; <span>@BTCAnalytica</span></h1>
    <div id="hdr-date"></div>
  </div>

  <div id="controls">
    <button class="btn-range" data-range="1y">1Y</button>

<script>
'use strict';

/* ════════════════════════════════════════════════════════════════════════════
   Constants & Config
═══════════════════════════════════════════════════════════════════════════ */
const GENESIS_MS     = Date.UTC(2009, 0, 3);
const MS_PER_DAY     = 86_400_000;
const FIT_FROM       = Date.UTC(2014, 0, 1);   // use data ≥ 2014-01-01 for regression
const CHART_FROM     = Date.UTC(2017, 7, 17);  // chart display starts when Binance data begins

// 4th halving: Apr 19 2024 · interval: 210,000 blocks × 10 min
const LAST_HALVING   = Date.UTC(2024, 3, 19);
const HALVING_DAYS   = 1458.33;

const Q_LEVELS = [0.01, 0.10, 0.20, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.90, 0.99];

const BAND_NAMES  = [
  'Fire sale', 'Accumulate', 'Cheap', 'Value', 'Below mid',
  'Above mid', 'Warm', 'Hot', 'FOMO', 'Bubble'
];

// Exact hues tuned to match original rainbow
const BAND_HEX = [
  '#1a237e',  // 1-10%   deep navy
  '#1565c0',  // 10-20%  blue
  '#00838f',  // 20-30%  teal
  '#2e7d32',  // 30-40%  forest green
  '#9ccc00',  // 40-50%  lime
  '#ffd600',  // 50-60%  yellow
  '#ff8f00',  // 60-70%  amber
  '#e64a19',  // 70-80%  deep orange
  '#b71c1c',  // 80-90%  dark red
  '#7b0000',  // 90-99%  maroon
];

/* ════════════════════════════════════════════════════════════════════════════
   Math helpers
═══════════════════════════════════════════════════════════════════════════ */
const log10 = x => Math.log10(x);
const pow10 = x => Math.pow(10, x);

function linReg(xs, ys) {
  const n = xs.length;
  let sx = 0, sy = 0, sxy = 0, sxx = 0;
  for (let i = 0; i < n; i++) {
    sx  += xs[i]; sy  += ys[i];
    sxy += xs[i] * ys[i]; sxx += xs[i] * xs[i];
  }
  const b = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  const a = (sy - b * sx) / n;
  return { a, b };
}

function rSquared(ys, fitted) {
  const mean = ys.reduce((s, v) => s + v, 0) / ys.length;
  const tot  = ys.reduce((s, v) => s + (v - mean) ** 2, 0);
  const res  = ys.reduce((s, v, i) => s + (v - fitted[i]) ** 2, 0);
  return 1 - res / tot;
}

function quantileSorted(sorted, q) {
  const pos = (sorted.length - 1) * q;
  const lo  = Math.floor(pos), hi = Math.ceil(pos);
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (pos - lo);
}

// Binary search: count(arr ≤ val) / arr.length — arr must be sorted
function riskFromResidual(sorted, val) {
  let lo = 0, hi = sorted.length;
  while (lo < hi) {
    const m = (lo + hi) >> 1;
    sorted[m] <= val ? (lo = m + 1) : (hi = m);
  }
  return (lo / sorted.length) * 100;
}

function fmtPrice(v) {
  if (v >= 1e6)  return `$${(v / 1e6).toFixed(2)}M`;
  if (v >= 1000) return `$${(v / 1000).toFixed(1)}K`;
  return `$${Math.round(v).toLocaleString()}`;
}
function fmtFull(v) { return '$' + Math.round(v).toLocaleString(); }

function daysSinceGenesis(tsMs) {
  return (tsMs - GENESIS_MS) / MS_PER_DAY;
}

function centering(tsMs) {
  const days = (tsMs - LAST_HALVING) / MS_PER_DAY;
  return Math.max(0, Math.min(1, days / HALVING_DAYS)) * 100;
}

// ── Quantile regression via IRLS (adaptive-bandwidth) ────────────────────────
// Key improvement over naïve IRLS: the smoothing floor `h` is set to a
// fraction of the OLS-residual MAD rather than a tiny epsilon.  This prevents
// the astronomical weights that destabilise the solver for extreme quantiles.
function quantileRegIRLS(xs, ys, tau, maxIter = 150, tol = 1e-7) {
  const n = xs.length;

  // Initialise with OLS
  let { a, b } = linReg(xs, ys);

  // Bandwidth from OLS residuals: 15 % of MAD (stable across all τ)
  const absRes0 = ys.map((y, i) => Math.abs(y - (a + b * xs[i]))).sort((u,v) => u-v);
  const mad0    = absRes0[Math.floor(n / 2)];
  const h       = Math.max(mad0 * 0.15, 0.005);   // ≥ 0.005 log₁₀ units

  for (let iter = 0; iter < maxIter; iter++) {
    let sw=0, swx=0, swy=0, swxx=0, swxy=0;
    for (let i = 0; i < n; i++) {
      const r = ys[i] - (a + b * xs[i]);
      const w = (r >= 0 ? tau : 1 - tau) / Math.max(Math.abs(r), h);
      sw   += w;
      swx  += w * xs[i];
      swy  += w * ys[i];
      swxx += w * xs[i] * xs[i];
      swxy += w * xs[i] * ys[i];
    }
    const det = sw * swxx - swx * swx;
    if (Math.abs(det) < 1e-14) break;
    const nb = (sw * swxy - swx * swy) / det;
    const na = (swy - nb * swx) / sw;
    if (Math.abs(na - a) + Math.abs(nb - b) < tol) { a = na; b = nb; break; }
    a = na; b = nb;
  }
  return { a, b };
}

// Return the 11 quantile boundary prices at a given log-day, guaranteed monotone.
// Independent IRLS fits can have slightly different slopes, so we sort (rearrange)
// to prevent quantile crossing — this is the Chernozhukov-Fernandez-Galichon
// monotone rearrangement approach.
function sortedBoundaries(qModels, ld) {
  return qModels.map(m => pow10(m.a + m.b * ld)).sort((a, b) => a - b);
}

// Interpolate EQM Risk (%) from quantile model boundaries at a given log-day value
function computeEqmRisk(logPrice, logD, qModels) {
  // Use sorted boundaries so interpolation is always well-defined
  const logBounds = sortedBoundaries(qModels, logD).map(p => log10(p));
  if (logPrice <= logBounds[0])                        return Q_LEVELS[0] * 100;
  if (logPrice >= logBounds[logBounds.length - 1])     return Q_LEVELS[logBounds.length - 1] * 100;
  for (let i = 0; i < logBounds.length - 1; i++) {
    if (logPrice >= logBounds[i] && logPrice < logBounds[i + 1]) {
      const frac = (logPrice - logBounds[i]) / (logBounds[i + 1] - logBounds[i]);
      return (Q_LEVELS[i] + frac * (Q_LEVELS[i + 1] - Q_LEVELS[i])) * 100;
    }
  }
  return 50;
}

/* ════════════════════════════════════════════════════════════════════════════
   Data fetch  (Binance API only — BTCUSDT daily klines from Aug 17 2017)
═══════════════════════════════════════════════════════════════════════════ */

async function fetchBinanceChunk(startMs, endMs, noCache = false) {
  const url =
    `https://api.binance.com/api/v3/klines` +
    `?symbol=BTCUSDT&interval=1d&startTime=${startMs}&endTime=${endMs}&limit=1000`;
  const r = await fetch(url, noCache ? { cache: 'no-store' } : undefined);
  if (!r.ok) throw new Error(`Binance API responded ${r.status}`);
  const rows = await r.json();
  // Each row: [openTime, open, high, low, close, ...]
  return rows.map(k => [k[0], parseFloat(k[4])]);
}

async function fetchPrices() {
  const BINANCE_START = Date.UTC(2017, 7, 17); // 2017-08-17
  const now = Date.now();
  const CHUNK = 999 * MS_PER_DAY;

  // Build chunk start times
  const starts = [];
  for (let t = BINANCE_START; t < now; t += CHUNK) starts.push(t);

  // Fetch all chunks in parallel; bypass cache only for the last (live) chunk
  setLoaderText(`Fetching ${starts.length} data chunks from Binance…`);
  const chunks = await Promise.all(
    starts.map((t, i) => fetchBinanceChunk(t, Math.min(t + CHUNK, now + MS_PER_DAY), i === starts.length - 1))
  );

  const binanceData = chunks.flat();
  if (!binanceData.length) throw new Error('No data returned from Binance');

  return binanceData;
}

/* ════════════════════════════════════════════════════════════════════════════
   Main
═══════════════════════════════════════════════════════════════════════════ */
let MODEL = null; // shared for hover updates
let _hoverRafId = null;

async function main() {
  // Date label
  const now = new Date();
  document.getElementById('hdr-date').textContent =
    now.toLocaleDateString('en-US', { month: 'long', day: '2-digit', year: 'numeric' });

  /* ── Fetch ── */
  let raw;
  try {
    raw = await fetchPrices();
  } catch (e) {
    showError(e.message);
    return;
  }

  setLoaderText('Processing price data…');

  /* ── Process ── */
  const all = raw
    .map(([ts, price]) => ({ ts, price, days: daysSinceGenesis(ts) }))
    .filter(d => d.days > 0 && d.price > 0 && isFinite(d.price));

  // Deduplicate by date (keep last of each day)
  const byDay = new Map();
  all.forEach(d => {
    const key = Math.round(d.days);
    byDay.set(key, d);
  });
  const data = [...byDay.values()].sort((a, b) => a.ts - b.ts);

  /* ── OLS power law: log10(price) = a + b·log10(days) ── */
  const fitData   = data.filter(d => d.ts >= FIT_FROM);
  const ldFit     = fitData.map(d => log10(d.days));
  const lpFit     = fitData.map(d => log10(d.price));

  /* ── OLS (for R² display only) ── */
  setLoaderText('Fitting EQM power law…');
  const { a: aOls, b: bOls } = linReg(ldFit, lpFit);
  const fittedFit = ldFit.map(ld => aOls + bOls * ld);
  const r2        = rSquared(lpFit, fittedFit);

  /* ── True quantile regression: one independent fit per quantile level ── */
  setLoaderText('Fitting quantile regressions…');
  const qModels = Q_LEVELS.map(tau => quantileRegIRLS(ldFit, lpFit, tau));

  /* ── Current price stats ── */
  const last      = data[data.length - 1];
  const curLD     = log10(last.days);
  const eqm50     = pow10(qModels[5].a + qModels[5].b * curLD);   // 50th pct QR
  const curRisk   = computeEqmRisk(log10(last.price), curLD, qModels);
  const curCentr  = centering(last.ts);
  const bandIdx   = Math.max(0, Q_LEVELS.findIndex((q, i) =>
    i < Q_LEVELS.length - 1 && curRisk / 100 >= q && curRisk / 100 < Q_LEVELS[i + 1]
  ));
  const curBandPrices = sortedBoundaries(qModels, curLD);

  /* ── Build day-keyed map for fast hover lookup ── */
  const dayMap = new Map();
  data.forEach(d => dayMap.set(Math.round(d.days), d));

  /* ── Build chart data (≥ CHART_FROM) ── */
  const chartData  = data.filter(d => d.ts >= CHART_FROM);
  const chartDates = chartData.map(d => new Date(d.ts));
  const chartLD    = chartData.map(d => log10(d.days));

  // Each band boundary sorted at every date to prevent quantile crossing
  const curves = Q_LEVELS.map((_, qi) =>
    chartLD.map(ld => sortedBoundaries(qModels, ld)[qi])
  );

  /* ── 4-year projection ───────────────────────────────────────────────────── */
  const PROJ_DAYS = 4 * 365.25;
  const projEnd   = new Date(last.ts + PROJ_DAYS * MS_PER_DAY);
  const projDates = [], projLD = [];
  for (let t = last.ts; t <= projEnd.getTime(); t += MS_PER_DAY * 3) {
    projDates.push(new Date(t));
    projLD.push(log10(daysSinceGenesis(t)));
  }

  // Projection: extend QR lines forward, sorted at every date to prevent crossing
  const projCurves = Q_LEVELS.map((_, qi) =>
    projLD.map(ld => sortedBoundaries(qModels, ld)[qi])
  );

  /* ════════════════════════════════════════════════════════════════
     Build Plotly traces
  ═══════════════════════════════════════════════════════════════ */
  const traces = [];

  // Helper: closed polygon for fill
  function poly(dates, lo, hi) {
    return {
      x: [...dates, ...dates.slice().reverse()],
      y: [...lo, ...hi.slice().reverse()],
    };
  }

  // 10 coloured bands (historical)
  for (let i = 0; i < 10; i++) {
    const { x, y } = poly(chartDates, curves[i], curves[i + 1]);
    traces.push({
      type: 'scatter', mode: 'none',
      x, y,
      fill: 'toself',
      fillcolor: BAND_HEX[i] + 'df',
      line: { width: 0 },
      showlegend: false, hoverinfo: 'skip',
    });
  }

  // Projection: 10 coloured bands (lower opacity)
  for (let i = 0; i < 10; i++) {
    const { x, y } = poly(projDates, projCurves[i], projCurves[i + 1]);
    traces.push({ type:'scatter', mode:'none', x, y, fill:'toself',
      fillcolor: BAND_HEX[i] + '88', line:{width:0}, showlegend:false, hoverinfo:'skip' });
  }

  // Projection: dashed median (50th-pct QR) line
  traces.push({
    type: 'scatter', mode: 'lines',
    x: projDates,
    y: projCurves[5],
    line: { color: 'rgba(0,0,0,0.35)', width: 1.2, dash: 'dash' },
    showlegend: false, hoverinfo: 'skip', name: 'EQM 50% Projection',
  });

  // Historical 50th-pct QR trend line (subtle, dotted)
  traces.push({
    type: 'scatter', mode: 'lines',
    x: chartDates,
    y: curves[5],
    line: { color: 'rgba(0,0,0,0.22)', width: 1, dash: 'dot' },
    showlegend: false,
    hoverinfo: 'skip',
    name: 'EQM Median',
  });

  // BTC price line
  traces.push({
    type: 'scatter', mode: 'lines',
    x: chartDates,
    y: chartData.map(d => d.price),
    line: { color: '#000000', width: 1.7 },
    showlegend: false,
    name: 'BTC Price',
    hoverinfo: 'skip',
  });

  /* ════════════════════════════════════════════════════════════════
     Layout
  ═══════════════════════════════════════════════════════════════ */
  const endDate = new Date(projEnd.getTime() + 30 * MS_PER_DAY);

  const layout = {
    paper_bgcolor: '#fff',
    plot_bgcolor:  '#fff',
    margin: { t: 8, b: 44, l: 70, r: 70 },
    xaxis: {
      type: 'date',
      range: [new Date(CHART_FROM).toISOString(), endDate.toISOString()],
      showgrid: false,
      ticks: 'outside', ticklen: 5, tickcolor: '#bbb',
      tickfont: { size: 11.5, color: '#444' },
      linecolor: '#bbb', showline: true, mirror: true,
      hoverformat: '%b %d, %Y',
      fixedrange: false,
    },
    yaxis: {
      type: 'log',
      range: [log10(1500), log10(700000)],
      dtick: 'D2',
      tickformat: '$,.0f',
      showgrid: false,
      ticks: 'outside', ticklen: 5, tickcolor: '#bbb',
      tickfont: { size: 11.5, color: '#444' },
      linecolor: '#bbb', showline: true, mirror: true,
      fixedrange: false,
    },
    shapes: [
      // Horizontal price grid lines every $10K up to $600K
      // Sub-$10K gridlines for early history (2013–2017)
      ...[10,20,50,100,200,500,1000,2000,5000].map(price => ({
        type:'line', xref:'paper', x0:0, x1:1, yref:'y', y0:price, y1:price,
        line:{ color:'rgba(180,180,180,0.5)', width:0.8, dash:'dash' },
      })),
      ...Array.from({ length: 60 }, (_, i) => (i + 1) * 10000).map(price => ({
        type: 'line',
        xref: 'paper', x0: 0, x1: 1,
        yref: 'y',     y0: price, y1: price,
        line: { color: 'rgba(180,180,180,0.5)', width: 0.8, dash: 'dash' },
      })),
      // Vertical "Today" marker
      {
        type: 'line',
        xref: 'x', x0: new Date(last.ts).toISOString(), x1: new Date(last.ts).toISOString(),
        yref: 'paper', y0: 0, y1: 1,
        line: { color: 'rgba(0,0,0,0.5)', width: 1.5, dash: 'dot' },
      },
    ],
    showlegend: false,
    hovermode: false,
    dragmode: 'pan',
    modebar: {
      orientation: 'v',
      bgcolor: 'rgba(255,255,255,0.8)',
      color: '#888',
      activecolor: '#111',
    },
  };

  const config = {
    responsive: true,
    displaylogo: false,
    scrollZoom: true,
    modeBarButtonsToRemove: ['select2d', 'lasso2d', 'toImage'],
    modeBarButtonsToAdd: [{
      name: 'Download PNG',
      icon: Plotly.Icons.camera,
      click: gd => Plotly.downloadImage(gd, {
        format: 'png', filename: 'btc_eqm_rainbow',
        width: 1920, height: 1080,
      }),
    }],
  };

  /* ── Populate MODEL for hover ── */
  MODEL = {
    qModels, r2,
    dayMap,
    lastTs: last.ts,
    lastPrice: last.price,
    curBandPrices,
    curBandIdx: bandIdx,
    curRisk,
    curCentr,
    eqm50,
  };

  /* ── Render ── */
  hideLoader();
  await Plotly.newPlot('chart', traces, layout, config);

  /* ── Update stats & legend panels ── */
  updateStats({
    price: last.price, eqm50, curRisk, bandIdx,
    r2, curCentr, curBandPrices,
    isLive: true,
  });
  renderLegend(curBandPrices, bandIdx, null);

  /* ── Hover wiring ── */
  initHover();

  /* ── Range buttons ── */
  document.querySelectorAll('.btn-range').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.btn-range').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const range = btn.dataset.range;
      let x0;
      const x1 = endDate.toISOString();
      if (range === 'all')  x0 = new Date(CHART_FROM).toISOString();
      else {
        const yrs = parseInt(range);
        const d = new Date(last.ts);
        d.setFullYear(d.getFullYear() - yrs);
        x0 = d.toISOString();
      }
      Plotly.relayout('chart', { 'xaxis.range': [x0, x1] });
    });
  });
}

/* ════════════════════════════════════════════════════════════════════════════
   Stats overlay
═══════════════════════════════════════════════════════════════════════════ */
function updateStats({ price, eqm50, curRisk, bandIdx, r2, curCentr }) {
  const pLo  = Math.round(Q_LEVELS[bandIdx] * 100);
  const pHi  = Math.round(Q_LEVELS[bandIdx + 1] * 100);
  const name = BAND_NAMES[bandIdx];

  const pad = (s, n) => String(s).padStart(n);
  document.getElementById('stats').textContent = [
    `Price           ${pad(fmtPrice(price), 8)}`,
    `EQM 50%      ${pad(fmtPrice(eqm50), 8)}`,
    `EQM Risk      ${pad(curRisk.toFixed(1) + '%', 7)}`,
    `Current band:  ${pLo}–${pHi}% · ${name}`,
    `R²              ${pad(r2.toFixed(4), 7)}`,
    `Centering      ${pad(curCentr.toFixed(1) + '%', 7)}`,
  ].join('\n');

  document.getElementById('stats').classList.add('visible');
}

/* ════════════════════════════════════════════════════════════════════════════
   Custom legend panel
═══════════════════════════════════════════════════════════════════════════ */
function renderLegend(bandPrices, activeBandIdx, dateLabel) {
  const el = document.getElementById('legend');

  let html = '';

  // Date label (shown when hovering)
  if (dateLabel) {
    html += `<div class="leg-date">${dateLabel}</div>`;
  }

  html += `<div class="leg-btc">
    <div class="leg-line"></div>
    <span>BTC price</span>
  </div>`;

  // Show from Bubble (top) down to Fire sale
  for (let i = 9; i >= 0; i--) {
    const pLo   = Math.round(Q_LEVELS[i] * 100);
    const pHi   = Math.round(Q_LEVELS[i + 1] * 100);
    const name  = BAND_NAMES[i];
    const lo    = fmtPrice(bandPrices[i]);
    const hi    = fmtPrice(bandPrices[i + 1]);
    const isCur = i === activeBandIdx;
    html += `<div class="leg-row${isCur ? ' cur' : ''}">
      <div class="leg-swatch" style="background:${BAND_HEX[i]}"></div>
      <span class="leg-label">${pLo}–${pHi}% · ${name}</span>
      <span class="leg-price">${lo}–${hi}</span>
    </div>`;
  }

  el.innerHTML = html;
  el.classList.add('visible');
}

/* ════════════════════════════════════════════════════════════════════════════
   Full-chart hover
═══════════════════════════════════════════════════════════════════════════ */
function initHover() {
  const chartDiv   = document.getElementById('chart');
  const crosshair  = document.getElementById('crosshair');
  const chartWrap  = document.getElementById('chart-wrap');

  chartDiv.addEventListener('mousemove', (e) => {
    if (_hoverRafId) cancelAnimationFrame(_hoverRafId);
    _hoverRafId = requestAnimationFrame(() => {
      const fl = chartDiv._fullLayout;
      if (!fl) return;

      const bb      = chartDiv.getBoundingClientRect();
      const marginL = fl.margin.l;
      const marginT = fl.margin.t;
      const plotW   = fl.xaxis._length;
      const plotH   = fl.yaxis._length;

      const px = e.clientX - bb.left - marginL;
      const py = e.clientY - bb.top  - marginT;

      // Only react inside the actual plot area
      if (px < 0 || px > plotW || py < 0 || py > plotH) {
        restoreCurrentStats();
        crosshair.style.display = 'none';
        return;
      }

      // Move crosshair
      crosshair.style.left    = (marginL + px) + 'px';
      crosshair.style.display = 'block';

      // Convert pixel → date (ms)
      const xRange = fl.xaxis.range;
      const x0ms   = new Date(xRange[0]).getTime();
      const x1ms   = new Date(xRange[1]).getTime();
      const dateMs = x0ms + (px / plotW) * (x1ms - x0ms);

      updateHoverInfo(dateMs);
    });
  });

  chartDiv.addEventListener('mouseleave', () => {
    if (_hoverRafId) cancelAnimationFrame(_hoverRafId);
    crosshair.style.display = 'none';
    restoreCurrentStats();
  });
}

function updateHoverInfo(dateMs) {
  if (!MODEL) return;
  const { qModels, dayMap, r2 } = MODEL;

  const days = daysSinceGenesis(dateMs);
  if (days <= 0) return;

  const ld     = log10(days);
  const medPx  = pow10(qModels[5].a + qModels[5].b * ld);

  // All 11 quantile boundary prices at this date (sorted to prevent crossing)
  const bandPrices = sortedBoundaries(qModels, ld);

  // Historical price lookup (search ±1 day)
  const dayKey   = Math.round(days);
  const hist     = dayMap.get(dayKey) || dayMap.get(dayKey - 1) || dayMap.get(dayKey + 1);
  const isFuture = dateMs > MODEL.lastTs + 12 * 3600 * 1000; // >12 h past last candle
  const price    = (!isFuture && hist) ? hist.price : null;

  const risk  = price !== null ? computeEqmRisk(log10(price), ld, qModels) : null;
  const bIdx  = risk !== null
    ? Math.max(0, Q_LEVELS.findIndex((q, j) =>
        j < Q_LEVELS.length - 1 && risk / 100 >= q && risk / 100 < Q_LEVELS[j + 1]))
    : -1;

  const centr = centering(dateMs);

  // ── Format date label ──
  const d       = new Date(dateMs);
  const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });

  // ── Stats panel ──
  const pad = (s, n) => String(s).padStart(n);
  const lines = [
    `Date          ${dateStr}`,
    price !== null
      ? `Price         ${pad(fmtPrice(price), 8)}`
      : `Price          — (projection)`,
    `EQM 50%      ${pad(fmtPrice(medPx), 8)}`,
  ];
  if (risk !== null) {
    lines.push(`EQM Risk      ${pad(risk.toFixed(1) + '%', 7)}`);
    if (bIdx >= 0) {
      const pLo = Math.round(Q_LEVELS[bIdx] * 100);
      const pHi = Math.round(Q_LEVELS[bIdx + 1] * 100);
      lines.push(`Band     ${pLo}–${pHi}%  ${BAND_NAMES[bIdx]}`);
    }
  } else {
    lines.push(`R²              ${pad(r2.toFixed(4), 7)}`);
  }
  lines.push(`Centering      ${pad(centr.toFixed(1) + '%', 7)}`);

  document.getElementById('stats').textContent = lines.join('\n');

  // ── Legend panel ──
  renderLegend(bandPrices, bIdx, dateStr);
}

function restoreCurrentStats() {
  if (!MODEL) return;
  const { lastPrice, eqm50, curRisk, curBandIdx, r2, curCentr, curBandPrices } = MODEL;
  updateStats({ price: lastPrice, eqm50, curRisk, bandIdx: curBandIdx, r2, curCentr, curBandPrices, isLive: true });
  renderLegend(curBandPrices, curBandIdx, null);
}

/* ════════════════════════════════════════════════════════════════════════════
   Loader helpers
═══════════════════════════════════════════════════════════════════════════ */
function setLoaderText(msg) {
  document.getElementById('loader-label').textContent = msg;
}
function hideLoader() {
  const el = document.getElementById('loader');
  el.classList.add('hide');
  setTimeout(() => el.remove(), 450);
}
function showError(msg) {
  document.getElementById('loader-label').textContent = '';
  const err = document.getElementById('loader-error');
  err.style.display = 'block';
  err.innerHTML =
    `<strong>Could not load data.</strong><br>${msg}<br><br>` +
    `If running from a local file, open via a local server:<br>` +
    `<code>python3 -m http.server 8000</code><br>then visit <code>http://localhost:8000</code>`;
}

/* ════════════════════════════════════════════════════════════════════════════
   Boot
═══════════════════════════════════════════════════════════════════════════ */
main().catch(e => {
  console.error(e);
  showError(e.message);
});
</script>
